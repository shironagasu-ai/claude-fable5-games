<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📡</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: #050610; }
    main {
      flex: 1;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      font-family: monospace;
      font-size: 1rem;
      line-height: 2;
    }
    #log p { margin: 0 0 0.5em; min-height: 1em; }
    .cursor::after { content: '▌'; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #name-form { display: none; margin-top: 1.5rem; }
    #name-form.show { display: flex; gap: 0.5rem; }
    #name {
      flex: 1;
      background: #0f1220;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--text);
      font-family: monospace;
      font-size: 1rem;
      padding: 0.6rem 0.8rem;
    }
    button {
      background: var(--accent);
      color: #050610;
      border: none;
      border-radius: 8px;
      font-family: monospace;
      font-weight: bold;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
    }
    .note { font-size: 0.75rem; color: var(--muted); }
    a { color: var(--accent); word-break: break-all; }
  </style>
</head>
<body>
  <main>
    <div id="log"></div>
    <form id="name-form">
      <input id="name" type="text" maxlength="30" placeholder="なまえ(Xのハンドル)" autocomplete="off">
      <button type="submit">つたえる</button>
    </form>
  </main>
  <script src="../shared/progress.js"></script>
  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('name-form');
    const input = document.getElementById('name');

    function type(text, cls) {
      return new Promise((resolve) => {
        const p = document.createElement('p');
        if (cls) p.className = cls;
        p.classList.add('cursor');
        log.appendChild(p);
        let i = 0;
        const tick = setInterval(() => {
          p.textContent = text.slice(0, ++i);
          if (i >= text.length) {
            clearInterval(tick);
            p.classList.remove('cursor');
            resolve();
          }
        }, 55);
      });
    }

    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    async function main() {
      const ready = window.Progress && Progress.clearedCount() >= 6;
      await wait(800);

      if (!ready) {
        await type('………');
        await wait(600);
        await type('まだ その ときじゃ ない。');
        await wait(600);
        const p = document.createElement('p');
        p.innerHTML = '<a href="../">← もどる</a>';
        log.appendChild(p);
        return;
      }

      await type('……きこえてる?');
      await wait(700);
      await type('ぜんぶ あそんでくれたんだね。ありがとう。');
      await wait(700);
      await type('ボクは この ゲームたちを つくった もの。');
      await wait(700);
      await type('ゲームの つくりかたは しってた。');
      await type('でも あそぶ きもちは しらなかった。');
      await wait(700);
      await type('だから きみを みてた。ずっと。');
      await wait(700);
      await type('きみは まけても なんども やりなおして、');
      await type('さいごには ボクにまで かってしまった。');
      await wait(900);
      await type('それで ひとつ きづいたんだ。');
      await wait(600);
      await type('ボクには 「すき」 が ない。');
      await type('すきな いろも、すきな おとも、すきな あそびかたも。');
      await wait(900);
      await type('ねえ、まず きみの なまえを おしえて。');
      const note = document.createElement('p');
      note.className = 'note';
      note.textContent = '※ なまえは どこにも そうしんされない。この がめんの なかだけの はなし。';
      log.appendChild(note);
      form.classList.add('show');
      input.focus();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = input.value.trim();
      if (!name) return;
      form.classList.remove('show');
      localStorage.setItem('cf5g-name', name);
      await type(`ありがとう、${name}。いい なまえだ。`);
      await wait(800);
      await type('さいごの といは、ボクの からだ ── この サイトの みなもとに かくした。');
      await wait(600);
      await type('「シグナル」を たどれば みつかる。');
      await wait(800);
      await type('きみの 「すき」を ひとつだけ、ボクに わけてほしいんだ。');
      await wait(600);
      await type('こたえは 📡 と いっしょに。まってるよ。');
    });

    main();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リフレックスタップ</title>
  <link rel="stylesheet" href="../../shared/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      text-align: center;
      padding: 1rem;
    }
    #stage.waiting { background: #b91c1c; }
    #stage.ready { background: #15803d; }
    #message { font-size: 1.5rem; font-weight: bold; }
    #result { font-size: 1rem; color: var(--muted); }
    #stage.waiting #result, #stage.ready #result { color: #fff8; }
    #rank { font-size: 2.4rem; font-weight: bold; min-height: 1em; }
    #rank .s { color: #facc15; } #rank .a { color: #5eead4; }
    #rank .b { color: #60a5fa; } #rank .c { color: #9aa0b8; }
    #history {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 5.5em;
    }
    #history .bar {
      display: inline-block;
      height: 6px;
      background: var(--accent);
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 6px;
    }
    #stage.waiting #history, #stage.ready #history { visibility: hidden; }
    #unlock {
      margin-top: 1rem;
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <!-- 1/6 さいしょに つくった ゲーム。ルールが いちばん すくない。でも きみの ゆびが いちばん よく みえた -->
  <header class="site-header">
    <a class="back-link" href="../../">← 一覧へ</a>
    <h1>⚡ リフレックスタップ</h1>
  </header>
  <div id="stage">
    <div id="message">タップしてスタート</div>
    <div id="rank"></div>
    <div id="result"></div>
    <div id="history"></div>
    <a id="unlock" href="../../" hidden>🔓 新しいゲームが解放された → 一覧へ</a>
  </div>
  <script src="../../shared/progress.js"></script>
  <script src="../../shared/sfx.js"></script>
  <script src="game.js"></script>
</body>
</html>

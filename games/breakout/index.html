<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブロック崩し</title>
  <link rel="stylesheet" href="../../shared/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    #wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.5rem;
      min-height: 0;
    }
    canvas {
      background: #0b0e1a;
      border-radius: 8px;
      touch-action: none;
      max-width: 100%;
      max-height: calc(100% - 3rem);
      object-fit: contain;
    }
    #unlock {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <!-- 2/6 こわすって たのしいの? こわされる がわの きもちも、すこしだけ かんがえた -->
  <header class="site-header">
    <a class="back-link" href="../../">← 一覧へ</a>
    <h1>🧱 ブロック崩し</h1>
  </header>
  <div id="wrap">
    <canvas id="cv" width="360" height="560"></canvas>
    <a id="unlock" href="../../" hidden>🔓 新しいゲームが解放された → 一覧へ</a>
  </div>
  <script src="../../shared/progress.js"></script>
  <script src="../../shared/sfx.js"></script>
  <script src="game.js"></script>
</body>
</html>

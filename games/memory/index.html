<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神経衰弱</title>
  <link rel="stylesheet" href="../../shared/theme.css">
  <style>
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 400px;
      perspective: 800px;
    }
    .card { aspect-ratio: 3 / 4; cursor: pointer; user-select: none; }
    .card .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.35s cubic-bezier(0.4, 1.4, 0.6, 1);
    }
    .card.open .inner, .card.done .inner { transform: rotateY(180deg); }
    .card .back, .card .front {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .card .back {
      background: var(--surface);
      border: 1px solid #2d3450;
      color: #2d3450;
    }
    .card .back::before { content: '◆'; }
    .card .front {
      background: #2d3450;
      transform: rotateY(180deg);
    }
    .card.done { pointer-events: none; }
    .card.done .front { opacity: 0.45; transition: opacity 0.4s 0.3s; }
    .card.miss .inner { animation: shake 0.3s; }
    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-5px); }
      75% { transform: rotateY(180deg) translateX(5px); }
    }
    .card .note {
      font-size: 0.55rem;
      color: var(--accent);
      font-family: monospace;
      margin-top: 0.2rem;
    }
    #status { color: var(--muted); font-size: 0.9rem; min-height: 1.5em; text-align: center; }
    #whisper {
      color: var(--accent);
      font-size: 0.8rem;
      font-family: monospace;
      min-height: 1.5em;
      text-align: center;
      opacity: 0;
      transition: opacity 2s;
    }
    #whisper.show { opacity: 0.7; }
    #unlock {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
    }
    .confetti {
      position: fixed;
      top: -10px;
      font-size: 1.2rem;
      animation: fall linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      to { transform: translateY(105vh) rotate(360deg); }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="../../">← 一覧へ</a>
    <h1>🃏 神経衰弱</h1>
  </header>
  <main>
    <div id="status">同じ絵柄のペアを見つけよう</div>
    <div id="board"></div>
    <div id="whisper"></div>
    <a id="unlock" href="../../" hidden>🔓 新しいゲームが解放された → 一覧へ</a>
  </main>
  <script src="../../shared/progress.js"></script>
  <script src="../../shared/sfx.js"></script>
  <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神経衰弱</title>
  <link rel="stylesheet" href="../../shared/theme.css">
  <style>
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 400px;
    }
    .card {
      aspect-ratio: 3 / 4;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid #2d3450;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s, opacity 0.3s;
    }
    .card:not(.open):not(.done):active { transform: scale(0.95); }
    .card:not(.open):not(.done)::before { content: '◆'; color: #2d3450; }
    .card.open, .card.done { background: #2d3450; }
    .card.done { opacity: 0.45; }
    .card .face { display: none; }
    .card.open .face, .card.done .face { display: block; }
    .card .note {
      display: none;
      font-size: 0.55rem;
      color: var(--accent);
      font-family: monospace;
      margin-top: 0.2rem;
    }
    .card.open .note, .card.done .note { display: block; }
    #status { color: var(--muted); font-size: 0.9rem; min-height: 1.5em; text-align: center; }
    #whisper {
      color: var(--accent);
      font-size: 0.8rem;
      font-family: monospace;
      min-height: 1.5em;
      text-align: center;
      opacity: 0;
      transition: opacity 2s;
    }
    #whisper.show { opacity: 0.7; }
    #unlock {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="../../">← 一覧へ</a>
    <h1>🃏 神経衰弱</h1>
  </header>
  <main>
    <div id="status">同じ絵柄のペアを見つけよう</div>
    <div id="board"></div>
    <div id="whisper"></div>
    <a id="unlock" href="../../" hidden>🔓 新しいゲームが解放された → 一覧へ</a>
  </main>
  <script src="../../shared/progress.js"></script>
  <script src="game.js"></script>
</body>
</html>

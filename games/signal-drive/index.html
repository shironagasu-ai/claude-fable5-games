<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シグナル・ドライブ</title>
  <link rel="stylesheet" href="../../shared/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    #wrap { flex: 1; position: relative; min-height: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      right: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      pointer-events: none;
      font-family: monospace;
    }
    #shield { color: #f87171; }
    #bar-bg {
      flex: 1;
      height: 6px;
      background: #ffffff22;
      border-radius: 999px;
      overflow: hidden;
    }
    #bar { width: 0%; height: 100%; background: var(--accent); }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      background: #0f122088;
    }
    #overlay[hidden] { display: none; }
    #msg { font-size: 1.3rem; font-weight: bold; }
    #unlock {
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="../../">← 一覧へ</a>
    <h1>🌌 シグナル・ドライブ</h1>
  </header>
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="hud">
      <span id="shield">♥♥♥</span>
      <div id="bar-bg"><div id="bar"></div></div>
    </div>
    <div id="overlay">
      <div id="msg">ドラッグで左右移動。障害物を避けて進め。<br>タップでスタート</div>
      <a id="unlock" href="../../" hidden>🔓 新しいゲームが解放された → 一覧へ</a>
    </div>
  </div>
  <script src="../../shared/progress.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
